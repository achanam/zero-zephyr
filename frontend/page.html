<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#c9a35d">

<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://z.achanam.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Zero Zephyr" />
<link rel="manifest" href="/site.webmanifest" />
<title>Zero Zephyr / Secure Send</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #0e1118;
    --ink-soft:  #141820;
    --panel:     #181e2a;
    --line:      #252d3f;
    --line-soft: #1d2435;
    --brass:     #c9a35d;
    --brass-glow:#e3c98a;
    --paper:     #eee8da;
    --paper-dim: #7a7669;
    --danger:    #c96a5e;
    --ok:        #6eaa7a;
    --radius:    6px;
    --bar-h:     64px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 10% -5%, rgba(201,163,93,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 90% 105%, rgba(201,163,93,0.05) 0%, transparent 55%);
    padding-bottom: calc(var(--bar-h) + 24px);
  }

  
  ::selection {
    background-color: var(--brass);
    color: #222222;
    }

  
  
  .wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px 16px;
  }

  
  header.brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }
  .brand-mark {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-icon {
    width: 28px; height: 28px;
    flex-shrink: 0;
    color: var(--brass);
  }
  header.brand h1 {
    font-size: 17px;
    letter-spacing: 0.1em;
    font-weight: 600;
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
  }
  header.brand h1 span { color: var(--brass); }
  .faq-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    color: var(--paper-dim);
    font-family: 'IBM Plex Mono', monospace;
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 6px 10px;
    transition: color .15s, border-color .15s, background .15s;
    flex-shrink: 0;
  }
  .faq-link svg { width: 12px; height: 12px; flex-shrink: 0; }
  .faq-link:hover {
    color: var(--brass-glow);
    border-color: rgba(201,163,93,0.4);
    background: rgba(201,163,93,0.06);
  }
  .faq-link:focus-visible {
    outline: 2px solid var(--brass);
    outline-offset: 2px;
  }
  .tagline {
    font-size: 11px;
    color: var(--paper-dim);
    margin-bottom: 32px;
    padding-left: 38px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
  }

  
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 24px;
  }

  
  .field { margin-bottom: 18px; }
  .field:last-of-type { margin-bottom: 0; }
  .field label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--paper-dim);
    margin-bottom: 7px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .field label svg { width: 12px; height: 12px; opacity: 0.7; }

  textarea,
  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    color: var(--paper);
    padding: 10px 12px;
    font-size: 13.5px;
    border-radius: var(--radius);
    font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
    appearance: none;
  }
  textarea:focus,
  input:focus {
    outline: none;
    border-color: rgba(201,163,93,0.5);
    box-shadow: 0 0 0 3px rgba(201,163,93,0.07);
  }
  textarea {
    min-height: 120px;
    resize: vertical;
    line-height: 1.55;
  }
  input::placeholder, textarea::placeholder { color: var(--paper-dim); opacity: 0.6; }

  
  .dropdown { position: relative; }
  .dropdown-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    color: var(--paper);
    padding: 10px 12px;
    font-size: 13.5px;
    border-radius: var(--radius);
    font-family: inherit;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .dropdown-trigger:hover { border-color: rgba(201,163,93,0.35); }
  .dropdown.disabled .dropdown-trigger {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }
  .dropdown.open .dropdown-trigger {
    border-color: rgba(201,163,93,0.5);
    box-shadow: 0 0 0 3px rgba(201,163,93,0.07);
  }
  .dropdown-chevron {
    display: flex;
    flex-shrink: 0;
    color: var(--paper-dim);
    transition: transform .15s;
  }
  .dropdown-chevron svg { width: 10px; height: 10px; }
  .dropdown.open .dropdown-chevron { transform: rotate(180deg); color: var(--brass); }

  .dropdown-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: 0 12px 28px rgba(0,0,0,0.45);
    padding: 5px;
    z-index: 30;
    opacity: 0;
    transform: translateY(-4px);
    pointer-events: none;
    transition: opacity .13s, transform .13s;
    max-height: 248px;
    overflow-y: auto;
  }
  .dropdown.open .dropdown-menu {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .dropdown-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 9px;
    font-size: 13px;
    color: var(--paper);
    border-radius: 4px;
    cursor: pointer;
    transition: background .12s;
  }
  .dropdown-option:hover { background: rgba(201,163,93,0.1); }
  .dropdown-option.selected { color: var(--brass-glow); }
  .dropdown-option .opt-check {
    width: 12px; height: 12px;
    flex-shrink: 0;
    color: var(--brass);
    opacity: 0;
  }
  .dropdown-option.selected .opt-check { opacity: 1; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  
  .filedrop {
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    background: var(--ink-soft);
  }
  .filedrop:hover { border-color: rgba(201,163,93,0.4); background: rgba(201,163,93,0.03); }
  .filedrop.has-file { border-color: var(--ok); border-style: solid; }
  .filedrop input { display: none; }
  .filedrop-icon { color: var(--paper-dim); margin-bottom: 8px; }
  .filedrop-icon svg { width: 28px; height: 28px; }
  .filedrop-text { font-size: 13px; color: var(--paper-dim); }
  .filedrop-name { font-size: 13px; color: var(--paper); font-weight: 500; }
  .filedrop-size { font-size: 11px; color: var(--paper-dim); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

  
  .divider {
    height: 1px;
    background: var(--line);
    margin: 20px 0;
  }

  
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 0;
  }
  .toggle-row + .toggle-row {
    border-top: 1px solid var(--line-soft);
  }
  .toggle-label .title { font-size: 13px; color: var(--paper); line-height: 1.3; }
  .toggle-label .sub { font-size: 11px; color: var(--paper-dim); margin-top: 3px; line-height: 1.4; }

  .switch {
    width: 36px; height: 20px;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .2s, border-color .2s;
  }
  .switch.on {
    background: rgba(201,163,93,0.2);
    border-color: rgba(201,163,93,0.6);
  }
  .switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 12px; height: 12px;
    background: var(--paper-dim);
    border-radius: 50%;
    transition: left .18s, background .18s;
  }
  .switch.on::after { left: 19px; background: var(--brass-glow); }

  
  .pw-mode-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    position: relative;
  }
  .pw-mode-tab {
    flex: 1;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    color: var(--paper-dim);
    padding: 7px 10px;
    font-size: 11.5px;
    font-family: inherit;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
  }
  .pw-mode-tab.active {
    background: rgba(201,163,93,0.12);
    border-color: rgba(201,163,93,0.55);
    color: var(--brass-glow);
  }
  .pw-recommended-badge {
    position: absolute;
    top: -9px;
    right: 4px;
    background: var(--brass);
    color: var(--ink);
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    font-family: 'IBM Plex Mono', monospace;
  }

  
  .pw-generated-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .pw-generated-box input {
    flex: 1;
    background: transparent;
    border: none;
    padding: 0;
    color: var(--brass-glow);
    font-size: 13.5px;
    letter-spacing: 0.02em;
  }
  .pw-generated-box input:focus { outline: none; box-shadow: none; }
  .pw-icon-btn {
    background: transparent;
    border: none;
    color: var(--paper-dim);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color .15s;
    flex-shrink: 0;
  }
  .pw-icon-btn:hover { color: var(--brass-glow); }
  .pw-icon-btn svg { width: 15px; height: 15px; }

  
  .pw-gen-options {
    margin-top: 12px;
    padding: 14px;
    background: var(--ink-soft);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
  }
  .pw-gen-options-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    font-size: 11.5px;
    color: var(--paper-dim);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.03em;
    margin-top: 10px;
    padding: 2px 0;
  }
  .pw-gen-options-toggle svg {
    width: 12px; height: 12px;
    transition: transform .2s;
  }
  .pw-gen-options-toggle.open svg { transform: rotate(180deg); }

  .pw-length-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    font-size: 12px;
    color: var(--paper-dim);
  }
  .pw-length-row .pw-length-value {
    color: var(--brass-glow);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  input[type="range"].pw-slider {
    width: 100%;
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    appearance: none;
    outline: none;
    margin-bottom: 14px;
    cursor: pointer;
  }
  input[type="range"].pw-slider::-webkit-slider-thumb {
    appearance: none;
    width: 16px; height: 16px;
    background: var(--brass);
    border-radius: 50%;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  input[type="range"].pw-slider::-webkit-slider-thumb:hover { background: var(--brass-glow); }
  input[type="range"].pw-slider::-webkit-slider-thumb:active { transform: scale(1.15); }
  input[type="range"].pw-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--brass);
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }

  .pw-char-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
  }
  .pw-char-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 5px 0;
  }
  .pw-char-row .pw-char-label { font-size: 12px; color: var(--paper); }
  .pw-char-row .pw-char-sample {
    font-size: 10px;
    color: var(--paper-dim);
    font-family: 'IBM Plex Mono', monospace;
    opacity: 0.7;
  }
  .pw-strength-note {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--line-soft);
    font-size: 11px;
    color: var(--paper-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pw-strength-note svg { width: 12px; height: 12px; flex-shrink: 0; }
  .pw-strength-note.weak   { color: var(--danger); }
  .pw-strength-note.ok     { color: var(--paper-dim); }
  .pw-strength-note.strong { color: var(--ok); }

  
  .pw-reveal-box {
    margin-top: 14px;
    padding: 12px;
    background: rgba(194,106,94,0.06);
    border: 1px solid rgba(194,106,94,0.3);
    border-radius: var(--radius);
  }
  .pw-reveal-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--danger);
    margin-bottom: 8px;
  }
  .pw-reveal-label svg { width: 12px; height: 12px; }
  .pw-reveal-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pw-reveal-row input {
    flex: 1;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 11px;
    color: var(--paper);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .pw-reveal-row input:focus { outline: none; }
  .pw-reveal-warning {
    margin-top: 9px;
    font-size: 11px;
    color: var(--paper-dim);
    line-height: 1.55;
  }

  
  .hint {
    font-size: 11.5px;
    color: var(--paper-dim);
    margin-top: 7px;
    line-height: 1.5;
    font-family: 'IBM Plex Mono', monospace;
  }
  .req-asterisk { color: var(--brass); }

  .error-box {
    margin-top: 14px;
    padding: 12px 15px;
    background: rgba(201,106,94,0.08);
    border: 1px solid rgba(201,106,94,0.35);
    border-radius: var(--radius);
    color: var(--danger);
    font-size: 13px;
    line-height: 1.4;
  }

  
  .result {
    margin-top: 20px;
    padding: 18px;
    background: var(--ink-soft);
    border: 1px solid rgba(201,163,93,0.3);
    border-radius: var(--radius);
  }
  .result-seal {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 12px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .result-seal svg { width: 13px; height: 13px; }
  .link-box {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .link-box input {
    flex: 1;
    color: var(--brass-glow);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 9px 11px;
  }
  .btn-ghost {
    background: none;
    border: 1px solid var(--line);
    color: var(--paper-dim);
    padding: 0 14px;
    font-size: 12px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    transition: border-color .15s, color .15s;
    height: 38px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-ghost svg { width: 13px; height: 13px; }
  .btn-ghost:hover { border-color: rgba(201,163,93,0.5); color: var(--brass-glow); }

  
  .receive-card { text-align: center; }
  .receive-icon {
    width: 52px; height: 52px;
    margin: 0 auto 20px;
    border: 1px solid rgba(201,163,93,0.35);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--brass);
    background: rgba(201,163,93,0.06);
  }
  .receive-icon svg { width: 24px; height: 24px; }

  .content-box {
    background: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    text-align: left;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13.5px;
    line-height: 1.6;
    margin-top: 16px;
    max-height: 380px;
    overflow-y: auto;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--paper);
  }

  .file-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-top: 16px;
    text-align: left;
  }
  .file-card-icon { color: var(--paper-dim); flex-shrink: 0; }
  .file-card-icon svg { width: 24px; height: 24px; }
  .file-card .fname { font-size: 13px; color: var(--paper); word-break: break-all; font-weight: 500; }
  .file-card .fsize { font-size: 11px; color: var(--paper-dim); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

  .burn-note {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    font-size: 11.5px;
    color: var(--brass-glow);
    font-family: 'IBM Plex Mono', monospace;
    opacity: 0.85;
  }
  .burn-note svg { width: 12px; height: 12px; flex-shrink: 0; }

  
  .section-label {
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--paper-dim);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 12px;
  }

  
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: rgba(14,17,24,0.9);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 20px;
    z-index: 100;
  }

  
  .bar-tabs {
    display: flex;
    background: var(--ink-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 3px;
    gap: 2px;
    flex: 1;
    max-width: 280px;
  }
  .bar-tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
    color: var(--paper-dim);
    background: none;
    border: none;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .bar-tab svg { width: 14px; height: 14px; flex-shrink: 0; }
  .bar-tab.active {
    background: var(--panel);
    color: var(--brass-glow);
    border: 1px solid var(--line);
  }
  .bar-tab .locked-badge {
    font-size: 9px;
    opacity: 0.5;
    font-family: 'IBM Plex Mono', monospace;
  }

  
  .bar-send {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--brass);
    color: var(--ink);
    border: none;
    padding: 0 20px;
    height: 40px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: background .15s, transform .1s, opacity .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

const PBKDF2_ITERATIONS = 600000;

function randomBytes(len) {
  return crypto.getRandomValues(new Uint8Array(len));
}

function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let binary = '';
  for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function b64ToBuf(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, saltBytes) {
  const baseKey = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBytes, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptJson(password, obj) {
  const salt = randomBytes(16);
  const iv = randomBytes(12);
  const key = await deriveKey(password, salt);
  const plaintext = new TextEncoder().encode(JSON.stringify(obj));
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, plaintext);
  return { salt: bufToB64(salt), iv: bufToB64(iv), ciphertext: bufToB64(ciphertext) };
}

async function decryptJson(password, saltB64, ivB64, ciphertextB64) {
  const salt = b64ToBuf(saltB64);
  const iv = b64ToBuf(ivB64);
  const key = await deriveKey(password, salt);
  const ciphertext = b64ToBuf(ciphertextB64);
  const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(plaintext));
}

async function encryptBytes(password, saltBytes, bytes) {
  const iv = randomBytes(12);
  const key = await deriveKey(password, saltBytes);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, bytes);
  return { iv: bufToB64(iv), ciphertext };
}

async function decryptBytes(password, saltB64, ivB64, ciphertextBuf) {
  const salt = b64ToBuf(saltB64);
  const iv = b64ToBuf(ivB64);
  const key = await deriveKey(password, salt);
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertextBuf);
}

const PW_CHAR_SETS = {
  upper:   'ABCDEFGHJKLMNPQRSTUVWXYZ',
  lower:   'abcdefghijkmnopqrstuvwxyz',
  numbers: '23456789',
  symbols: '!@#$%^&*()-_=+[]{}?',
};

function uniformRandomInt(maxExclusive) {
  if (maxExclusive <= 0) throw new Error('maxExclusive must be positive');
  if (maxExclusive > 256) {
    throw new Error('uniformRandomInt: maxExclusive > 256 not supported by this byte-based implementation');
  }
  const range = 256 - (256 % maxExclusive);
  const buf = new Uint8Array(1);
  let val;
  do {
    crypto.getRandomValues(buf);
    val = buf[0];
  } while (val >= range);
  return val % maxExclusive;
}

function pickRandomChar(pool) {
  return pool[uniformRandomInt(pool.length)];
}

function fisherYatesShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = uniformRandomInt(i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateSliderFill(slider) {

  const min = Number(slider.min) || 0;
  const max = Number(slider.max) || 100;

  slider.style.background =
    `linear-gradient(to right, var(--brass) 0%, var(--brass) ${pct}%, var(--line) ${pct}%, var(--line) 100%)`;
}

function generatePassword(options) {
  const enabledClasses = Object.keys(PW_CHAR_SETS).filter((k) => options[k]);
  if (enabledClasses.length === 0) {
    throw new Error('Select at least one character type.');
  }
  if (options.length < enabledClasses.length) {
    throw new Error(`Length must be at least ${enabledClasses.length} to include one of each selected type.`);
  }

  const combinedPool = enabledClasses.map((k) => PW_CHAR_SETS[k]).join('');

  const chars = enabledClasses.map((k) => pickRandomChar(PW_CHAR_SETS[k]));

  while (chars.length < options.length) {
    chars.push(pickRandomChar(combinedPool));
  }

  return fisherYatesShuffle(chars).join('');
}

function estimatePasswordStrength(options) {
  const classCount = ['upper', 'lower', 'numbers', 'symbols'].filter((k) => options[k]).length;
  const poolSize = ['upper', 'lower', 'numbers', 'symbols']
    .filter((k) => options[k])
    .reduce((sum, k) => sum + PW_CHAR_SETS[k].length, 0);
  const entropyBits = options.length * Math.log2(Math.max(poolSize, 2));

  if (entropyBits < 40 || classCount === 0) return { label: 'Weak', level: 'weak' };
  if (entropyBits < 70) return { label: 'Adequate', level: 'ok' };
  return { label: 'Strong', level: 'strong' };
}

function xhrUpload(url, headers, body) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    Object.entries(headers).forEach(([k, v]) => xhr.setRequestHeader(k, v));
    xhr.responseType = 'text';

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        const fill = document.getElementById('progress-fill');
        const pctEl = document.getElementById('progress-pct');
        if (fill) fill.style.width = `${pct}%`;
        if (pctEl) pctEl.textContent = `${pct}%`;
      }
    };

    xhr.onload = () => {
      const data = JSON.parse(xhr.responseText || '{}');
      if (xhr.status >= 200 && xhr.status < 300) resolve(data);
      else reject(new Error(data.error || `Upload failed (${xhr.status})`));
    };
    xhr.onerror = () => reject(new Error('Network error during upload.'));
    xhr.send(body);
  });
}

function xhrDownload(url, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url);
    xhr.responseType = 'arraybuffer';

    xhr.onprogress = (e) => {
      if (e.lengthComputable && onProgress) {
        onProgress(Math.round((e.loaded / e.total) * 100));
      }
    };

    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        const ivFile = xhr.getResponseHeader('X-Iv-File');
        const saltFile = xhr.getResponseHeader('X-Salt-File');
        resolve({ ivFile, saltFile, buffer: xhr.response });
      } else {
        let errMsg = 'Download failed.';
        try { errMsg = JSON.parse(new TextDecoder().decode(xhr.response)).error || errMsg; } catch {}
        reject(new Error(errMsg));
      }
    };
    xhr.onerror = () => reject(new Error('Network error during download.'));
    xhr.send();
  });
}

    function wireDropdown(dropdownId, triggerId, menuId, hiddenId, labelId) {
      const dd      = document.getElementById(dropdownId);
      const trigger = document.getElementById(triggerId);
      const menu    = document.getElementById(menuId);
      const hidden  = document.getElementById(hiddenId);
      const labelEl = document.getElementById(labelId);

      const closeDd = () => dd.classList.remove('open');

      trigger.addEventListener('click', (e) => {
        if (trigger.disabled) return;
        e.stopPropagation();
        dd.classList.toggle('open');
      });

      menu.querySelectorAll('.dropdown-option').forEach((opt) => {
        opt.addEventListener('click', () => {
          menu.querySelectorAll('.dropdown-option').forEach((o) => o.classList.remove('selected'));
          opt.classList.add('selected');
          hidden.value = opt.dataset.value;
          labelEl.textContent = opt.dataset.label;
          closeDd();
        });
      });

      document.addEventListener('click', (e) => {
        if (dd.isConnected && !dd.contains(e.target)) closeDd();
      });
      trigger.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDd();
      });

      return { dd, trigger };
    }

    wireDropdown('expiresDropdown', 'expiresTrigger', 'expiresMenu', 'expiresIn', 'expiresLabel');

    if (pwMode === 'generate' && !generatedPassword) {

    renderPwModeArea();

    if (mode === 'file') {

        if (!hint) return;
        if (mode === 'file') {
          hint.innerHTML = hasKey
            ? `→ Key provided — max <strong>100 MB</strong>, no send limit.`
            : `→ Without a key: max <strong>20 MB</strong>, rate limited. With a valid key: max <strong>100 MB</strong>, no send limit.`;
        } else {
          hint.innerHTML = hasKey
            ? `→ Key provided — no send limit.`
            : `→ Without a key: rate limited per IP. With a valid key: no send limit.`;
        }
      });
    }
  }

  function renderPwModeArea() {
    const area = document.getElementById('pwModeArea');
    if (!area) return;

    if (pwMode === 'manual') {
      area.innerHTML = `
        <input type="password" id="password" placeholder="Required — never sent to the server" autocomplete="off" autocapitalize="off" spellcheck="false">
        <div class="hint">→ Encrypted in this browser before it ever leaves your device. Share the link and password through separate channels.</div>
      `;
      return;
    }

    const strength = estimatePasswordStrength(pwGenOptions);
    area.innerHTML = `
      <div class="pw-generated-box">
        <input type="text" id="genPwDisplay" readonly value="${escapeHtml(generatedPassword)}">
        <button type="button" class="pw-icon-btn" id="genPwRegen" title="Generate a new password">${SVG.refresh}</button>
        <button type="button" class="pw-icon-btn" id="genPwCopy" title="Copy">${SVG.copy}</button>
      </div>
      <div class="pw-gen-options">
        <div class="pw-length-row">
          <span>Length</span>
          <span class="pw-length-value" id="pwLengthValue">${pwGenOptions.length}</span>
        </div>
        <input type="range" class="pw-slider" id="pwLengthSlider" min="5" max="99" value="${pwGenOptions.length}">
        <div class="pw-char-grid">
          <div class="pw-char-row">
            <span class="pw-char-label">A-Z Uppercase</span>
            <div class="switch ${pwGenOptions.upper ? 'on' : ''}" id="pwToggleUpper"></div>
          </div>
          <div class="pw-char-row">
            <span class="pw-char-label">a-z Lowercase</span>
            <div class="switch ${pwGenOptions.lower ? 'on' : ''}" id="pwToggleLower"></div>
          </div>
          <div class="pw-char-row">
            <span class="pw-char-label">0-9 Numbers</span>
            <div class="switch ${pwGenOptions.numbers ? 'on' : ''}" id="pwToggleNumbers"></div>
          </div>
          <div class="pw-char-row">
            <span class="pw-char-label">!@# Symbols</span>
            <div class="switch ${pwGenOptions.symbols ? 'on' : ''}" id="pwToggleSymbols"></div>
          </div>
        </div>
        <div class="pw-strength-note ${strength.level}" id="pwStrengthNote">
          ${SVG.shield} ${strength.label} — ${pwGenOptions.length} characters, ${['upper','lower','numbers','symbols'].filter(k => pwGenOptions[k]).length} character ${['upper','lower','numbers','symbols'].filter(k => pwGenOptions[k]).length === 1 ? 'type' : 'types'}
        </div>
      </div>
      <div class="hint" style="margin-top:10px;">→ Generated locally with a cryptographically secure random generator. Never sent to the server. Save it now — it will not be shown again after you leave this page.</div>
    `;

    updateSliderFill(document.getElementById('pwLengthSlider'));

    const regenerate = () => {
      try {
        generatedPassword = generatePassword(pwGenOptions);
        document.getElementById('genPwDisplay').value = generatedPassword;
      } catch (err) {
        const area2 = document.getElementById('pwModeArea');
        const existingErr = area2.querySelector('.error-box');
        if (existingErr) existingErr.remove();
        const errEl = document.createElement('div');
        errEl.className = 'error-box';
        errEl.style.marginTop = '10px';
        errEl.textContent = err.message;
        area2.querySelector('.pw-gen-options').insertAdjacentElement('afterend', errEl);
      }
    };

    document.getElementById('genPwRegen').addEventListener('click', regenerate);

    document.getElementById('genPwCopy').addEventListener('click', () => {
      navigator.clipboard.writeText(generatedPassword);
      const btn = document.getElementById('genPwCopy');
      btn.innerHTML = SVG.check;
      setTimeout(() => { if (btn.isConnected) btn.innerHTML = SVG.copy; }, 1400);
    });

    const slider = document.getElementById('pwLengthSlider');
    slider.addEventListener('input', () => {
      pwGenOptions.length = Number(slider.value);
      document.getElementById('pwLengthValue').textContent = pwGenOptions.length;
      updateSliderFill(slider);
      regenerate();
      refreshStrengthNote();
    });

    const toggleMap = { upper: 'pwToggleUpper', lower: 'pwToggleLower', numbers: 'pwToggleNumbers', symbols: 'pwToggleSymbols' };
    Object.entries(toggleMap).forEach(([key, id]) => {
      document.getElementById(id).addEventListener('click', (e) => {
        const enabledCount = Object.keys(toggleMap).filter((k) => pwGenOptions[k]).length;
        if (pwGenOptions[key] && enabledCount === 1) return;
        pwGenOptions[key] = !pwGenOptions[key];
        e.currentTarget.classList.toggle('on', pwGenOptions[key]);
        regenerate();
        refreshStrengthNote();
      });
    });

    function refreshStrengthNote() {
      const note = document.getElementById('pwStrengthNote');
      if (!note) return;
      const s = estimatePasswordStrength(pwGenOptions);
      const activeCount = ['upper','lower','numbers','symbols'].filter(k => pwGenOptions[k]).length;
      note.className = `pw-strength-note ${s.level}`;
      note.innerHTML = `${SVG.shield} ${s.label} — ${pwGenOptions.length} characters, ${activeCount} character ${activeCount === 1 ? 'type' : 'types'}`;
    }
  }

  async function handleSend() {
    const resultArea = document.getElementById('result-area');
    const btn = document.getElementById('sendBtn');
    resultArea.innerHTML = '';

    const title     = document.getElementById('title').value.trim() || 'Untitled';
    const password  = pwMode === 'generate' ? generatedPassword : document.getElementById('password').value;
    const maxViews  = document.getElementById('maxViews').value;
    const expiresIn = document.getElementById('expiresIn').value;

    if (!password) {
      resultArea.innerHTML = pwMode === 'generate'
        ? `<div class="error-box">Generate a password first — adjust the options above, then try again.</div>`
        : `<div class="error-box">An encryption password is required.</div>`;
      return;
    }

    const ALLOWED_EXPIRY_HOURS = [1, 3, 6, 12, 24, 48, 72];
    const expiresInNum = Number(expiresIn);
    if (!expiresIn || Number.isNaN(expiresInNum) || !ALLOWED_EXPIRY_HOURS.includes(expiresInNum)) {
      resultArea.innerHTML = `<div class="error-box">Please select a valid expiry option.</div>`;
      return;
    }

    const maxViewsNum = Number(maxViews);
    if (!Number.isInteger(maxViewsNum) || maxViewsNum < 1 || maxViewsNum > 9) {
      resultArea.innerHTML = `<div class="error-box">Max Views must be between 1 and 9.</div>`;
      return;
    }

    btn.disabled = true;

    const pwGenControlIds = ['genPwRegen', 'pwLengthSlider', 'pwToggleUpper', 'pwToggleLower', 'pwToggleNumbers', 'pwToggleSymbols'];
    pwGenControlIds.forEach((id) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.disabled = true;
      el.style.pointerEvents = 'none';
      el.style.opacity = '0.45';
    });
    const pwModeTabIds = ['pwModeManual', 'pwModeGenerate'];
    pwModeTabIds.forEach((id) => {
      const el = document.getElementById(id);
      if (el) { el.disabled = true; el.style.pointerEvents = 'none'; el.style.opacity = '0.6'; }
    });

    try {
      let data;

      if (mode === 'text') {
        btn.innerHTML = `${SVG.send} Encrypting…`;
        resultArea.innerHTML = renderProgressInResult([
          { id: 'enc', label: 'Encrypting message…' },
          { id: 'send', label: 'Sending to vault…' },
        ]);
        setStage('enc');

        const content = document.getElementById('content').value;
        if (!content.trim()) throw new Error('Message cannot be empty.');
        const enc = await encryptJson(password, { title, content });

        setStage('enc', true);
        setStage('send');
        btn.innerHTML = `${SVG.send} Sending…`;

        const apiKey = (document.getElementById('apiKey')?.value || '').trim();
        const textHeaders = { 'Content-Type': 'application/json' };
        if (apiKey) textHeaders['X-Api-Key'] = apiKey;

        const resp = await fetch(`${ZERO}/send/text`, {
          method: 'POST',
          headers: textHeaders,
          body: JSON.stringify({
            ciphertext: enc.ciphertext, salt: enc.salt, iv: enc.iv,
            burn_after_read: burnAfterRead,
            max_views: maxViews,
            expires_in_hours: expiresIn,
          }),
        });
        data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Send failed.');
        setStage('send', true);
        setProgressPct(100);

      } else {
        if (!selectedFile) throw new Error('Please select a file first.');
        const apiKey = document.getElementById('apiKey').value.trim();

        const PUBLIC_MAX  = 20 * 1024 * 1024;
        const AUTH_MAX    = 100 * 1024 * 1024;
        const maxAllowed  = apiKey ? AUTH_MAX : PUBLIC_MAX;

        if (selectedFile.size > maxAllowed) {
          throw new Error(apiKey
            ? `File too large. Max 100 MB with Internal Key.`
            : `File too large. Max 20 MB without Internal Key. Enter a valid key to upload up to 100 MB.`
          );
        }

        btn.innerHTML = `${SVG.send} Encrypting…`;
        resultArea.innerHTML = renderProgressInResult([
          { id: 'enc',    label: 'Encrypting file…' },
          { id: 'upload', label: 'Uploading encrypted file…' },
        ]);
        setStage('enc');

        const metaEnc = await encryptJson(password, {
          title,
          file_name: selectedFile.name,
          file_mime: selectedFile.type || 'application/octet-stream',
          file_size: selectedFile.size,
        });
        const fileBytes = new Uint8Array(await selectedFile.arrayBuffer());
        const saltFileBytes = randomBytes(16);
        const fileEnc   = await encryptBytes(password, saltFileBytes, fileBytes);
        const saltFileB64 = bufToB64(saltFileBytes);

        setStage('enc', true);
        setStage('upload');
        const fill = document.getElementById('progress-fill');
        if (fill) { fill.classList.remove('indeterminate'); fill.style.width = '0%'; }
        btn.innerHTML = `${SVG.send} Uploading…`;

        const uploadHeaders = {
          'X-Meta-Cipher':      metaEnc.ciphertext,
          'X-Salt':             metaEnc.salt,
          'X-Iv-Meta':          metaEnc.iv,
          'X-Salt-File':        saltFileB64,
          'X-Iv-File':          fileEnc.iv,
          'X-Burn-After-Read':  burnAfterRead ? '1' : '0',
          'X-Max-Views':        maxViews,
          'X-Expires-In-Hours': expiresIn,
        };
        if (apiKey) uploadHeaders['X-Api-Key'] = apiKey;

        data = await xhrUpload(`${ZERO}/send/file`, uploadHeaders, fileEnc.ciphertext);

        setStage('upload', true);
        setProgressPct(100);
      }

      const base = window.location.origin + window.location.pathname.replace(/\/$/, '');
      const link = `${base}?zk=${escapeHtml(data.slug)}`;

      const pwRevealBlock = pwMode === 'generate' ? `
        <div class="pw-reveal-box">
          <div class="pw-reveal-label">${SVG.alertTriangle} Generated password — shown only once</div>
          <div class="pw-reveal-row">
            <input type="text" id="pwRevealOut" readonly value="${escapeHtml(generatedPassword)}">
            <button class="btn-ghost" id="copyPwBtn">${SVG.copy} Copy</button>
          </div>
          <div class="pw-reveal-warning">→ This password will not be shown again after you leave this page. Save it now and send it to the recipient through a different channel than the link — anyone with both the link and this password can decrypt the contents.</div>
        </div>
      ` : '';

      resultArea.innerHTML = `
        <div class="result">
          <div class="result-seal">${SVG.seal} Sealed — ready to share</div>
          <div class="link-box">
            <input type="text" id="linkOut" readonly value="${link}">
            <button class="btn-ghost" id="copyBtn">${SVG.copy} Copy</button>
          </div>
          <div class="hint">→ Without the password, this data cannot be recovered by anyone — including us. Send it through a different channel than the link.</div>
          ${pwRevealBlock}
        </div>
      `;
      document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(link);
        document.getElementById('copyBtn').innerHTML = `${SVG.check} Copied`;
        setTimeout(() => {
          document.getElementById('copyBtn').innerHTML = `${SVG.copy} Copy`;
        }, 1800);
      });
      if (pwMode === 'generate') {
        document.getElementById('copyPwBtn').addEventListener('click', () => {
          navigator.clipboard.writeText(generatedPassword);
          document.getElementById('copyPwBtn').innerHTML = `${SVG.check} Copied`;
          setTimeout(() => {
            const b = document.getElementById('copyPwBtn');
            if (b) b.innerHTML = `${SVG.copy} Copy`;
          }, 1800);
        });
      }
    } catch (err) {
      resultArea.innerHTML = `<div class="error-box">${escapeHtml(err.message)}</div>`;
      pwGenControlIds.forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = false;
        el.style.pointerEvents = '';
        el.style.opacity = '';
      });
      pwModeTabIds.forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = false;
        el.style.pointerEvents = '';
        el.style.opacity = '';
      });
    } finally {
      btn.disabled = false;
      btn.innerHTML = `${SVG.send} Seal &amp; Send`;
    }
  }

  renderForm();
  renderBar();
}

function renderReceive(slug) {
  bar.style.display = 'none';
  app.innerHTML = `
    <div class="panel receive-card">
      <div class="receive-icon">${SVG.lock}</div>
      <div id="receive-body">
        <p style="color:var(--paper-dim); font-size:13px;">Opening vault…</p>
      </div>
    </div>
  `;
  fetchReceive(slug);
}

async function fetchReceive(slug) {
  const body = document.getElementById('receive-body');
  try {
    const resp = await fetch(`${ZERO}/receive/${slug}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });

    const contentType = resp.headers.get('Content-Type') || '';

    if (resp.ok && !contentType.includes('application/json')) {
      const envelope = {
        type: 'file',
        burned: true,
        salt: resp.headers.get('X-Salt'),
        iv_meta: resp.headers.get('X-Iv-Meta'),
        meta_cipher: resp.headers.get('X-Meta-Cipher'),
      };
      const ivFile = resp.headers.get('X-Iv-File');
      const saltFile = resp.headers.get('X-Salt-File');
      const cipherBuf = await resp.arrayBuffer();
      promptForPassword(slug, envelope, false, { ivFile, saltFile, cipherBuf });
      return;
    }

    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      body.innerHTML = `<div class="error-box">${escapeHtml(data.error || 'This message could not be accessed.')}</div>`;
      return;
    }

    const envelope = await resp.json();
    promptForPassword(slug, envelope);
  } catch (err) {
    body.innerHTML = `<div class="error-box">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

function promptForPassword(slug, envelope, wrongAttempt, preFetchedFile) {
  const body = document.getElementById('receive-body');
  body.innerHTML = `
    <p style="font-size:13px; color:var(--paper-dim); margin-bottom:14px;">
      This message is encrypted end-to-end.
    </p>
    <div class="field">
      <label>${SVG.key} Password</label>
      <input type="password" id="pwInput" placeholder="Enter password" autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <button class="btn-primary" id="pwSubmit">${SVG.lock} Unlock</button>
    <div id="pwError"></div>
  `;
  document.getElementById('pwSubmit').addEventListener('click', () => {
    attemptDecrypt(slug, envelope, document.getElementById('pwInput').value, preFetchedFile);
  });
  document.getElementById('pwInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('pwSubmit').click();
  });
  document.getElementById('pwInput').focus();
  if (wrongAttempt) {
    document.getElementById('pwError').innerHTML =
      `<div class="error-box" style="margin-top:12px;">Incorrect password — decryption failed.</div>`;
  }
}

async function attemptDecrypt(slug, envelope, password, preFetchedFile) {
  const body = document.getElementById('receive-body');
  if (!password) return;

  body.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-stage" id="stage-dec">
        <span class="dot"></span><span>Decrypting…</span>
      </div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill indeterminate" id="progress-fill"></div>
      </div>
    </div>
  `;

  try {
    const meta = await decryptJson(password, envelope.salt, envelope.iv_meta, envelope.meta_cipher);
    setStage('dec', true);
    setProgressPct(100);
    await new Promise(r => setTimeout(r, 180));

    if (envelope.type === 'text') {
      renderTextResult(meta, envelope.burned);
    } else {
      await renderFileResult(envelope, meta, password, preFetchedFile);
    }
  } catch (err) {
    promptForPassword(slug, envelope, true, preFetchedFile);
  }
}

function renderTextResult(meta, burned) {
  const body = document.getElementById('receive-body');
  const burnNote = burned
    ? `<div class="burn-note">${SVG.fire} Destroyed after opening — this was your only chance to read it</div>`
    : '';
  body.innerHTML = `
    <p style="font-size:12px; color:var(--paper-dim); margin-bottom:4px;">${escapeHtml(meta.title)}</p>
    <div class="content-box" id="contentBox">${escapeHtml(meta.content)}</div>
    <button class="btn-ghost" id="copyContentBtn" style="margin-top:14px;">${SVG.copy} Copy Text</button>
    ${burnNote}
  `;
  document.getElementById('copyContentBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(meta.content);
    document.getElementById('copyContentBtn').innerHTML = `${SVG.check} Copied`;
  });
}

async function renderFileResult(envelope, meta, password, preFetchedFile) {
  const body = document.getElementById('receive-body');
  const burnNote = envelope.burned
    ? `<div class="burn-note">${SVG.fire} This message has been destroyed — save it now, it cannot be reopened</div>`
    : '';
  const fsize = meta.file_size ? `${(meta.file_size/1024/1024).toFixed(2)} MB` : '';

  body.innerHTML = `
    <p style="font-size:12px; color:var(--paper-dim); margin-bottom:4px;">${escapeHtml(meta.title)}</p>
    <div class="file-card">
      <div class="file-card-icon">${SVG.file}</div>
      <div>
        <div class="fname">${escapeHtml(meta.file_name)}</div>
        <div class="fsize">${fsize}</div>
      </div>
    </div>
    <button class="btn-primary" id="dlBtn">${SVG.download} Download &amp; Decrypt</button>
    <div id="dl-progress"></div>
    ${burnNote}
  `;

  document.getElementById('dlBtn').addEventListener('click', async () => {
    const dlBtn = document.getElementById('dlBtn');
    const dlProgress = document.getElementById('dl-progress');
    dlBtn.disabled = true;

    try {
      let ivFile, cipherBuf, saltFile;

      if (preFetchedFile) {
        ivFile = preFetchedFile.ivFile;
        cipherBuf = preFetchedFile.cipherBuf;
        saltFile = preFetchedFile.saltFile;

        dlProgress.innerHTML = renderProgressInResult([
          { id: 'dec', label: 'Decrypting file…' },
        ]);
        setStage('dec');
      } else {
        dlProgress.innerHTML = renderProgressInResult([
          { id: 'dl',  label: 'Downloading encrypted file…' },
          { id: 'dec', label: 'Decrypting…' },
        ]);
        setStage('dl');
        const fill = document.getElementById('progress-fill');
        if (fill) { fill.classList.remove('indeterminate'); fill.style.width = '0%'; }

        const result = await xhrDownload(envelope.download_url, (pct) => {
          setProgressPct(pct);
        });
        ivFile = result.ivFile;
        saltFile = result.saltFile;
        cipherBuf = result.buffer;
        setStage('dl', true);
        setStage('dec');
      }

      const fill = document.getElementById('progress-fill');
      if (fill) { fill.classList.add('indeterminate'); fill.style.width = ''; }
      document.getElementById('progress-pct').textContent = '';

      const plainBuf = await decryptBytes(password, saltFile, ivFile, cipherBuf);

      setStage('dec', true);
      setProgressPct(100);
      await new Promise(r => setTimeout(r, 150));

      const blob = new Blob([plainBuf], { type: meta.file_mime || 'application/octet-stream' });
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = meta.file_name || 'file';
      document.body.appendChild(a);
      a.click();
      a.remove();

      dlBtn.innerHTML = `${SVG.check} Saved`;
      dlProgress.innerHTML = '';
    } catch (err) {
      dlBtn.disabled = false;
      dlBtn.innerHTML = `${SVG.download} Download &amp; Decrypt`;
      dlProgress.innerHTML = `<div class="error-box" style="margin-top:12px;">${escapeHtml(err.message)}</div>`;
    }
  });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

route();
</script>
</body>
</html>
